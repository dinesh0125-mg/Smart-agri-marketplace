# ============================================
# SMART AGRICULTURE MARKETPLACE - CONFIG
# ============================================
# Sensitive values are loaded from .env file.
# See .env.example for the required variables.
# ============================================

# Server
server.port=8080
server.servlet.context-path=/api

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JWT CONFIGURATION
# ============================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# ============================================
# CLOUDINARY CONFIGURATION
# ============================================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ============================================
# RAZORPAY CONFIGURATION
# ============================================
razorpay.key-id=${RAZORPAY_KEY_ID}
razorpay.key-secret=${RAZORPAY_KEY_SECRET}
razorpay.currency=INR
razorpay.company-name=Smart Agriculture Marketplace

# ============================================
# EMAIL CONFIGURATION (Gmail SMTP)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# App Email
app.mail.from=${MAIL_FROM}
app.mail.from-name=Smart Agriculture Marketplace

# ============================================
# APP CONFIGURATION
# ============================================
app.name=Smart Agriculture Marketplace
app.base-url=${APP_BASE_URL}
app.frontend-url=${APP_FRONTEND_URL}

# Email Verification Token Expiry (hours)
app.email-verification.expiry-hours=24

# Password Reset Token Expiry (minutes)
app.password-reset.expiry-minutes=30

# ============================================
# FILE UPLOAD
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ============================================
# SWAGGER / OPENAPI
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ============================================
# LOGGING
# ============================================
logging.level.com.smartagri=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# GOOGLE OAUTH CONFIGURATION
# ============================================
app.google.client-id=${GOOGLE_CLIENT_ID}
